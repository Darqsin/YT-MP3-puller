name: Build TuneVault Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Build TuneVault EXE
        run: pyinstaller TuneVault.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          & $iscc "TuneVault.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TuneVault_Setup
          path: installer_output/TuneVault_Setup.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TuneVault_EXE
          path: dist/TuneVault.exe
