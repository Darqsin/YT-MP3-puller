name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build TuneVault.exe
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onefile --name TuneVault tunevault.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build TuneVault_Setup.exe
        run: iscc installer\TuneVault.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TuneVault_Setup
          path: TuneVault_Setup.exe
